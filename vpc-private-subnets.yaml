AWSTemplateFormatVersion: '2010-09-09'
Description: >
  VPC with 4 private subnets spread across 2 Availability Zones (2 subnets per AZ),
  using a single regional NAT Gateway (AvailabilityMode: regional) for outbound
  internet access. Regional NAT Gateways are VPC-scoped rather than subnet-scoped,
  so no public subnet is required to host it, and it automatically expands and
  contracts across whichever AZs your workloads use - giving multi-AZ NAT
  resilience without per-AZ NAT Gateways, public subnets, or per-AZ route entries.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  PrivateSubnet1CidrAz1:
    Type: String
    Default: 10.0.0.0/24
    Description: CIDR block for private subnet 1 in AZ1

  PrivateSubnet2CidrAz1:
    Type: String
    Default: 10.0.1.0/24
    Description: CIDR block for private subnet 2 in AZ1

  PrivateSubnet1CidrAz2:
    Type: String
    Default: 10.0.2.0/24
    Description: CIDR block for private subnet 1 in AZ2

  PrivateSubnet2CidrAz2:
    Type: String
    Default: 10.0.3.0/24
    Description: CIDR block for private subnet 2 in AZ2

Resources:

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-vpc'

  # --- Internet Gateway ---

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-igw'

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # --- Regional NAT Gateway ---
  # AvailabilityMode: regional means this NAT Gateway is VPC-scoped, not tied to
  # a subnet. It automatically expands/contracts to cover whichever AZs your
  # workloads are running in - no public subnet, and no per-AZ NAT Gateway needed.

  NatGatewayEip:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-nat-eip'

  NatGateway:
    Type: AWS::EC2::NatGateway
    DependsOn: InternetGatewayAttachment
    Properties:
      AvailabilityMode: regional
      VpcId: !Ref VPC
      AllocationId: !GetAtt NatGatewayEip.AllocationId
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-regional-nat-gw'

  # --- Subnets: AZ1 ---

  PrivateSubnet1Az1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CidrAz1
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-az1-1'

  PrivateSubnet2Az1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CidrAz1
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-az1-2'

  # --- Subnets: AZ2 ---

  PrivateSubnet1Az2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CidrAz2
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-az2-1'

  PrivateSubnet2Az2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CidrAz2
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-az2-2'

  # --- Route Tables (one per AZ, shared by the two private subnets in that AZ) ---
  # Both route 0.0.0.0/0 to the same regional NAT Gateway ID - the NAT Gateway
  # itself handles routing traffic out via whichever AZ the request originated in.

  PrivateRouteTableAz1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-rt-az1'

  PrivateRouteAz1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableAz1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateRouteTableAz2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-private-rt-az2'

  PrivateRouteAz2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableAz2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1Az1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1Az1
      RouteTableId: !Ref PrivateRouteTableAz1

  PrivateSubnet2Az1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2Az1
      RouteTableId: !Ref PrivateRouteTableAz1

  PrivateSubnet1Az2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1Az2
      RouteTableId: !Ref PrivateRouteTableAz2

  PrivateSubnet2Az2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2Az2
      RouteTableId: !Ref PrivateRouteTableAz2

Outputs:

  VpcId:
    Description: ID of the created VPC
    Value: !Ref VPC
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'

  NatGatewayId:
    Description: ID of the regional NAT Gateway
    Value: !Ref NatGateway
    Export:
      Name: !Sub '${AWS::StackName}-NatGatewayId'

  PrivateSubnet1Az1Id:
    Description: ID of private subnet 1 in AZ1
    Value: !Ref PrivateSubnet1Az1
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet1Az1Id'

  PrivateSubnet2Az1Id:
    Description: ID of private subnet 2 in AZ1
    Value: !Ref PrivateSubnet2Az1
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet2Az1Id'

  PrivateSubnet1Az2Id:
    Description: ID of private subnet 1 in AZ2
    Value: !Ref PrivateSubnet1Az2
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet1Az2Id'

  PrivateSubnet2Az2Id:
    Description: ID of private subnet 2 in AZ2
    Value: !Ref PrivateSubnet2Az2
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet2Az2Id'

  PrivateSubnetIds:
    Description: Comma-separated list of all private subnet IDs
    Value: !Join
      - ','
      - - !Ref PrivateSubnet1Az1
        - !Ref PrivateSubnet2Az1
        - !Ref PrivateSubnet1Az2
        - !Ref PrivateSubnet2Az2